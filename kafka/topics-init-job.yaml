apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-topics-init
  namespace: infra
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z kafka.infra.svc.cluster.local 9092; do echo waiting for kafka; sleep 5; done']
      containers:
        - name: create-topics
          image: apache/kafka:3.9.0
          command:
            - /bin/bash
            - -c
            - |
              /opt/kafka/bin/kafka-topics.sh --create --if-not-exists \
                --bootstrap-server kafka.infra.svc.cluster.local:9092 \
                --topic video-events --partitions 3 --replication-factor 1
              /opt/kafka/bin/kafka-topics.sh --create --if-not-exists \
                --bootstrap-server kafka.infra.svc.cluster.local:9092 \
                --topic watch-events --partitions 6 --replication-factor 1
              echo "Topics created successfully"
