# AWS overlay — EKS + Bedrock (Claude 3.5 Sonnet + Titan Embed v2) +
# in-cluster Kafka (KRaft) + in-cluster Elasticsearch + in-cluster pgvector.
# Matches the local topology — the only AWS-specific things are Bedrock for
# LLM/embeddings and the IRSA role ARN.

serviceAccount:
  # terraform output recommendations_irsa_role_arn
  roleArn: ROLE_ARN_PLACEHOLDER

configDynamic:
  LLM_PROVIDER: bedrock
  AWS_REGION: us-east-1
  BEDROCK_MODEL_ID: anthropic.claude-3-5-sonnet-20241022-v2:0
  BEDROCK_EMBEDDING_MODEL_ID: amazon.titan-embed-text-v2:0
  KAFKA_BROKERS: kafka.infra.svc.cluster.local:9092
  PGVECTOR_URL: postgresql://recouser:recopass@pgvector.infra.svc.cluster.local:5432/recommendations
