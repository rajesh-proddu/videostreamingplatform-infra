# AWS overlay — EKS + Bedrock (Claude 3.5 Sonnet + Titan Embed v2) + Aurora
# Postgres Serverless v2 + MSK Serverless (IAM auth).
# Placeholders are substituted from terraform outputs via external-secrets-operator
# or a bootstrap PR prior to first sync.

serviceAccount:
  # terraform output recommendations_irsa_role_arn
  roleArn: ROLE_ARN_PLACEHOLDER

config:
  LLM_PROVIDER: bedrock
  AWS_REGION: us-east-1
  BEDROCK_MODEL_ID: anthropic.claude-3-5-sonnet-20241022-v2:0
  BEDROCK_EMBEDDING_MODEL_ID: amazon.titan-embed-text-v2:0

  # pgvector now lives on Aurora Postgres Serverless v2. The service reads the
  # secret itself at startup using its IRSA-bound IAM role.
  # terraform output pgvector_endpoint / pgvector_secret_arn
  PGVECTOR_ENDPOINT: PG_ENDPOINT_PLACEHOLDER
  PGVECTOR_DATABASE: recommendations
  PGVECTOR_SECRET_ARN: PG_SECRET_ARN_PLACEHOLDER

  # Kafka (MSK Serverless, IAM auth) — used for future signal enrichment.
  KAFKA_SECURITY_PROTOCOL: SASL_SSL
  KAFKA_SASL_MECHANISM: AWS_MSK_IAM
  # terraform output msk_bootstrap_brokers_sasl_iam
  KAFKA_BROKERS: BOOTSTRAP_BROKERS_PLACEHOLDER
