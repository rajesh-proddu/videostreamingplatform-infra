# AWS overlay — EKS + MSK Serverless (IAM auth) + Glue + Iceberg on S3 +
# OpenSearch. Dynamic endpoints (brokers, OpenSearch URL, Iceberg warehouse,
# Glue registry, Athena workgroup + results bucket) come from AWS SSM
# Parameter Store via external-secrets-operator — no placeholders left to
# substitute by hand.
#
# The ServiceAccount IRSA role ARN stays here because SA annotations can't
# be rendered by ESO. It's deterministic from terraform
# (`terraform output analytics_irsa_role_arn`): commit the value once.

serviceAccount:
  # arn:aws:iam::<account_id>:role/videostreamingplatform-analytics-<env>
  roleArn: ROLE_ARN_PLACEHOLDER

env:
  ELASTICSEARCH_AWS_AUTH: "true"

# All former dynamic placeholders now come from SSM — only the static SASL
# knobs remain. We keep them in envDynamic so the ConfigMap reflects what
# the pod expects if ESO is ever disabled for debugging.
envDynamic:
  KAFKA_SECURITY_PROTOCOL: SASL_SSL
  KAFKA_SASL_MECHANISM: AWS_MSK_IAM

externalSecret:
  enabled: true
  ssmPathPrefix: /videostreamingplatform/prod
