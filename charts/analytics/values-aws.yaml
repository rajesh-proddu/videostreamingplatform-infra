# AWS overlay — EKS + in-cluster Kafka (KRaft) + in-cluster Elasticsearch +
# Glue catalog + Iceberg on S3 + Athena. Kafka and Elasticsearch are the same
# StatefulSets that run locally, just deployed via ArgoCD on EKS. No MSK,
# no OpenSearch, no ESO.
#
# IRSA role ARN and the S3/Athena names come from `terraform/aws/` outputs —
# paste them here once after `terraform apply` (or run `terraform output`
# and commit the values).

serviceAccount:
  # terraform output analytics_irsa_role_arn
  roleArn: ROLE_ARN_PLACEHOLDER

# Pulls private ghcr.io images. The Secret named `ghcr-pull` is seeded by
# bootstrap-aws.sh (seed_ghcr_secret) before the chart installs.
imagePullSecrets:
  - name: ghcr-pull

# Real S3 + Glue + Athena targets on AWS.
envDynamic:
  ICEBERG_WAREHOUSE: s3://videostreamingplatform-iceberg-warehouse-dev/
  GLUE_SCHEMA_REGISTRY_NAME: videostreamingplatform-dev
  ATHENA_WORKGROUP: videostreamingplatform-dev
  ATHENA_RESULTS_BUCKET: videostreamingplatform-athena-results-dev
