{{- if .Values.kafkaEsConsumer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-es-consumer
  namespace: {{ .Values.namespace }}
  labels:
    app: kafka-es-consumer
    {{- toYaml .Values.labels | nindent 4 }}
spec:
  replicas: {{ .Values.kafkaEsConsumer.replicas }}
  selector:
    matchLabels:
      app: kafka-es-consumer
  template:
    metadata:
      labels:
        app: kafka-es-consumer
        {{- toYaml .Values.labels | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: consumer
          image: {{ .Values.image.registry }}/{{ .Values.kafkaEsConsumer.image }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: analytics-env
            {{- if .Values.externalSecret.enabled }}
            - secretRef:
                name: {{ .Values.externalSecret.secretName }}
            {{- end }}
          env:
            {{- range $k, $v := .Values.kafkaEsConsumer.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.kafkaEsConsumer.resources | nindent 12 }}
{{- end }}
