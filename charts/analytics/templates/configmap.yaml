apiVersion: v1
kind: ConfigMap
metadata:
  name: analytics-env
  namespace: {{ .Values.namespace }}
  labels:
    {{- toYaml .Values.labels | nindent 4 }}
data:
  {{- range $k, $v := .Values.env }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- if not .Values.externalSecret.enabled }}
  {{- range $k, $v := .Values.envDynamic }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- else }}
  {{/* When ESO is enabled, keep only static SASL knobs from envDynamic here.
       Broker endpoint, OpenSearch URL, etc. ship in the ESO Secret. */}}
  {{- if index .Values.envDynamic "KAFKA_SECURITY_PROTOCOL" }}
  KAFKA_SECURITY_PROTOCOL: {{ index .Values.envDynamic "KAFKA_SECURITY_PROTOCOL" | quote }}
  {{- end }}
  {{- if index .Values.envDynamic "KAFKA_SASL_MECHANISM" }}
  KAFKA_SASL_MECHANISM: {{ index .Values.envDynamic "KAFKA_SASL_MECHANISM" | quote }}
  {{- end }}
  {{- end }}
