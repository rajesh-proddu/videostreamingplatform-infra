apiVersion: v1
kind: ConfigMap
metadata:
  name: analytics-env
  namespace: {{ .Values.namespace }}
  labels:
    {{- toYaml .Values.labels | nindent 4 }}
data:
  {{- range $k, $v := .Values.env }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- range $k, $v := .Values.envDynamic }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
