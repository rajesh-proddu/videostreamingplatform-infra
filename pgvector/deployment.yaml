apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pgvector
  namespace: infra
spec:
  serviceName: pgvector
  replicas: 1
  selector:
    matchLabels:
      app: pgvector
  template:
    metadata:
      labels:
        app: pgvector
    spec:
      containers:
        - name: pgvector
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: recommendations
            - name: POSTGRES_USER
              value: recouser
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pgvector-secret
                  key: password
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "recouser", "-d", "recommendations"]
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: pgvector-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: pgvector-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: pgvector-secret
  namespace: infra
type: Opaque
stringData:
  password: recopass
