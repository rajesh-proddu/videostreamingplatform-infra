apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: data
  namespace: argocd
spec:
  description: Data services (analytics + recommendations)
  sourceRepos:
    # Helm charts for analytics + recommendations live in the infra (GitOps) repo.
    - https://github.com/rajesh-proddu/videostreamingplatform-infra.git
    - https://github.com/rajesh-proddu/videostreamingplatform-analytics.git
    - https://github.com/rajesh-proddu/videostreamingplatform-recommendations.git
  destinations:
    - namespace: analytics
      server: https://kubernetes.default.svc
    - namespace: recommendations
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
