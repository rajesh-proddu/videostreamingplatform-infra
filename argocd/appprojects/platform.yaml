apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
spec:
  description: Platform services (main app + infra + cluster add-ons)
  sourceRepos:
    - https://github.com/rajesh-proddu/videostreamingplatform.git
    - https://github.com/rajesh-proddu/videostreamingplatform-infra.git
    # Upstream Helm chart for external-secrets-operator.
    - https://charts.external-secrets.io
  destinations:
    - namespace: videostreamingplatform
      server: https://kubernetes.default.svc
    - namespace: infra
      server: https://kubernetes.default.svc
    - namespace: external-secrets
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    # ESO installs cluster-scoped CRDs + a ClusterSecretStore.
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: external-secrets.io
      kind: ClusterSecretStore
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
