apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
spec:
  description: Platform services (main app + infra)
  sourceRepos:
    - https://github.com/yourusername/videostreamingplatform.git
    - https://github.com/yourusername/videostreamingplatform-infra.git
  destinations:
    - namespace: videostreamingplatform
      server: https://kubernetes.default.svc
    - namespace: infra
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
