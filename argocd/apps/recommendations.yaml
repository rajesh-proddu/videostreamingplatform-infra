apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: recommendations
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://github.com/rajesh-proddu/videostreamingplatform-infra.git
    targetRevision: main
    path: charts/recommendations
    # AWS deploy: Bedrock + Aurora pgvector + IRSA. Drop `valueFiles`
    # (or point at a local overlay) to run with Ollama + in-cluster
    # pgvector against Docker Compose / Kind.
    helm:
      valueFiles:
        - values.yaml
        - values-aws.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: recommendations
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
