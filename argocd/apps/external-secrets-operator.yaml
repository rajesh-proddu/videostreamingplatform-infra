apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-operator
  namespace: argocd
  annotations:
    # Install before any Application that declares ExternalSecret resources.
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: platform
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.9.20
    helm:
      values: |
        installCRDs: true
        serviceAccount:
          name: external-secrets
          # IRSA role ARN — terraform output external_secrets_irsa_role_arn.
          # Bootstrap this once after `terraform apply`.
          annotations:
            eks.amazonaws.com/role-arn: ESO_ROLE_ARN_PLACEHOLDER
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
