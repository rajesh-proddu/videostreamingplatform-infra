apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-config
  namespace: argocd
  annotations:
    # Runs after the operator (wave -10) and before consumers (default 0).
    argocd.argoproj.io/sync-wave: "-5"
spec:
  project: platform
  source:
    repoURL: https://github.com/rajesh-proddu/videostreamingplatform-infra.git
    targetRevision: main
    path: charts/external-secrets-config
    helm:
      valueFiles:
        - values.yaml
        - values-aws.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
