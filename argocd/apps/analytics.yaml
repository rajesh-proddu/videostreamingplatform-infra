apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: analytics
  namespace: argocd
spec:
  project: data
  source:
    repoURL: https://github.com/rajesh-proddu/videostreamingplatform-infra.git
    targetRevision: main
    path: charts/analytics
    # AWS deploy: MSK IAM + Glue + Iceberg S3 + IRSA. Drop `valueFiles`
    # (or point at a local overlay) to run the chart with plain defaults
    # against Docker Compose / Kind.
    helm:
      valueFiles:
        - values.yaml
        - values-aws.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: analytics
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
