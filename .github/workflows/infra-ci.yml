name: Infrastructure CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate K8s manifests
        run: |
          find . -name '*.yaml' \
            -not -path './.github/*' \
            -not -path './docker-compose*' \
            -not -path './argocd/*' \
            -not -path './charts/*' \
            | xargs kubeconform -strict -summary

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Validate rendered Helm charts
        run: |
          # Helm templates contain {{ .Values }} and aren't valid YAML until
          # rendered. Render each chart with default values and the AWS overlay,
          # then kubeconform the output.
          set -euo pipefail
          for chart in charts/*/; do
            chart_name=$(basename "$chart")
            echo "--- $chart_name (default values) ---"
            helm template "$chart_name" "$chart" | kubeconform -strict -summary
            if [ -f "$chart/values-aws.yaml" ]; then
              echo "--- $chart_name (values-aws) ---"
              helm template "$chart_name" "$chart" -f "$chart/values-aws.yaml" | kubeconform -strict -summary
            fi
          done

      - name: Validate ArgoCD manifests
        run: |
          find argocd/ -name '*.yaml' \
            | xargs kubeconform -strict -summary \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/argoproj.io/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            || echo "ArgoCD CRD validation skipped (CRDs may not be available)"

      - name: Lint docker-compose
        run: |
          docker compose -f docker-compose.infra.yml config --quiet
