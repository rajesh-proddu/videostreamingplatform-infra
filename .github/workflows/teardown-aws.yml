name: Teardown AWS

# Drains the EKS cluster (ArgoCD apps + LoadBalancer Services) and then
# runs `terraform destroy` on both the infra and platform modules.
# Wraps scripts/teardown-aws.sh.
#
# Safety gates (two layers, both required):
#
#   1. The `confirm` input must equal the `environment` input. This catches
#      accidental clicks on the wrong environment from the Actions UI.
#
#   2. The job targets a protected `environment:` (dev / prod). Configure
#      required reviewers on each environment in the repo settings
#      (Settings → Environments → Protection rules → "Required reviewers").
#      Once configured, runs wait for a named approver before any AWS or
#      kubectl call executes. This is enforced by GitHub, not by this file.
#
# Destroy is irreversible and costs real money if re-provisioning.

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Environment to destroy'
        options: [dev, prod]
        required: true
      confirm:
        description: 'Type the environment name to confirm'
        required: true

env:
  AWS_REGION: us-east-1
  TERRAFORM_VERSION: 1.12.1

jobs:
  teardown:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Verify confirm input matches environment
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "${{ github.event.inputs.environment }}" ]; then
            echo "confirm input ('${{ github.event.inputs.confirm }}') must equal environment ('${{ github.event.inputs.environment }}')"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Checkout videostreamingplatform (for platform terraform)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/videostreamingplatform
          path: videostreamingplatform
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Update kubeconfig
        continue-on-error: true
        run: |
          aws eks update-kubeconfig \
            --name "videostreamingplatform-${{ github.event.inputs.environment }}" \
            --region ${{ env.AWS_REGION }}

      - name: Run teardown script
        env:
          TFVARS_FILE: terraform.${{ github.event.inputs.environment }}.tfvars
          TF_VAR_rds_master_password: placeholder
          PLATFORM_REPO_ROOT: ${{ github.workspace }}/videostreamingplatform
        run: ./scripts/teardown-aws.sh --yes
