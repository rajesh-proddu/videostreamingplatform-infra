name: Deploy AWS infra Terraform (Glue/Athena/IRSA)

# Applies the downstream Terraform module that provisions AWS-managed
# analytics resources: Glue catalog + Schema Registry, Iceberg S3 warehouse,
# Athena workgroup, and the analytics-sa / recommendations-sa IRSA roles.
#
# Depends on the platform Terraform (videostreamingplatform repo) having
# already been applied — this module reads EKS OIDC + VPC outputs from its
# remote state.

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Deployment environment'
        options: [dev, prod]
        required: true
      destroy:
        type: boolean
        description: 'Destroy resources instead of applying'
        required: false
        default: false

env:
  AWS_REGION: us-east-1
  TERRAFORM_VERSION: 1.12.1

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: terraform/aws
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="key=infra/aws/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TERRAFORM_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Plan
        if: github.event.inputs.destroy == 'false'
        working-directory: terraform/aws
        run: |
          terraform plan \
            -var-file="terraform.${{ github.event.inputs.environment }}.tfvars" \
            -out=tfplan

      - name: Terraform Apply
        if: github.event.inputs.destroy == 'false'
        working-directory: terraform/aws
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: github.event.inputs.destroy == 'true'
        working-directory: terraform/aws
        run: |
          terraform destroy -auto-approve \
            -var-file="terraform.${{ github.event.inputs.environment }}.tfvars"

      - name: Show outputs
        if: github.event.inputs.destroy == 'false'
        working-directory: terraform/aws
        run: |
          echo "=== IRSA role ARNs (commit these into charts/*/values-aws.yaml) ==="
          terraform output -json | jq '.'
